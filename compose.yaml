name: vox
services:
  postgres:
    image: 'postgres:18-alpine'
    restart: always
    environment:
      - 'POSTGRES_DB=vox'
      - 'POSTGRES_USER=dev'
      - 'POSTGRES_PASSWORD=dev'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dev -d vox" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    image: vox:local
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1" ]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: vox-app:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
    #    env_file: ./frontend/.env.local
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./frontend/src:/app/src


volumes:
  postgres_data: