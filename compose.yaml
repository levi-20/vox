name: vox
services:
  postgres:
    image: 'postgres:18-alpine'
    environment:
      - 'POSTGRES_DB=vox'
      - 'POSTGRES_USER=dev'
      - 'POSTGRES_PASSWORD=dev'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d vox"]
      interval: 5s
      timeout: 5s
      retries: 5

  vox:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy


volumes:
  postgres_data: